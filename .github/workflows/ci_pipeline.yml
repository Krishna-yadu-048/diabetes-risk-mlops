name: CI Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run linter (ruff)
        run: ruff check src/ api/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          # Point MLflow at a temp local folder so no server is needed
          MLFLOW_TRACKING_URI: "sqlite:///mlruns_ci.db"
          MODEL_NAME: "diabetes-risk-model"
